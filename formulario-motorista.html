<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DrillGeo — Apontamento de Frota</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#1a3a8f;
  --blue-mid:#1e4db7;
  --blue-light:#2563eb;
  --blue-pale:#e8eef8;
  --white:#ffffff;
  --off-white:#f7f8fc;
  --gray-100:#f1f3f9;
  --gray-200:#e2e7f0;
  --gray-400:#9aaac4;
  --gray-600:#5a6a8a;
  --gray-800:#2d3a52;
  --black:#141c2e;
  --success:#16a34a;
  --danger:#dc2626;
  --border:#dde3f0;
  --shadow:0 4px 24px rgba(26,58,143,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Barlow',sans-serif;
  background:linear-gradient(160deg,#eef2fb 0%,#f7f8fc 60%,#e8eef8 100%);
  min-height:100vh;
  display:flex;align-items:flex-start;justify-content:center;
  padding:32px 16px 48px;
}
.card{
  width:100%;max-width:520px;
  background:var(--white);
  border-radius:16px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.card-header{
  background:var(--blue);
  padding:28px 32px 24px;
}
.brand{
  font-family:'Barlow Condensed',sans-serif;
  font-size:28px;font-weight:800;letter-spacing:1px;
  color:var(--white);line-height:1;margin-bottom:4px;
}
.brand span{color:#7db3ff;}
.subtitle{
  font-size:11px;letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(255,255,255,0.55);
}
.card-body{padding:32px;}

.field-block{margin-bottom:20px;}
.field-label{
  font-size:11px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--gray-600);margin-bottom:8px;display:block;
}
.field-hint{font-size:12px;color:var(--gray-400);margin-bottom:8px;line-height:1.5;}
.field-input{
  width:100%;background:var(--gray-100);
  border:1.5px solid var(--border);border-radius:8px;
  padding:13px 16px;color:var(--black);
  font-family:'DM Mono',monospace;font-size:14px;
  transition:all 0.2s;outline:none;
}
.field-input:focus{border-color:var(--blue-light);background:var(--white);box-shadow:0 0 0 3px rgba(37,99,235,0.10);}
.field-select{
  width:100%;background:var(--gray-100);
  border:1.5px solid var(--border);border-radius:8px;
  padding:13px 16px;color:var(--black);
  font-family:'Barlow',sans-serif;font-size:14px;
  outline:none;cursor:pointer;transition:all 0.2s;-webkit-appearance:none;
}
.field-select:focus{border-color:var(--blue-light);background:var(--white);}
.field-textarea{
  width:100%;background:var(--gray-100);
  border:1.5px solid var(--border);border-radius:8px;
  padding:13px 16px;color:var(--black);
  font-family:'Barlow',sans-serif;font-size:14px;
  resize:vertical;min-height:90px;outline:none;transition:all 0.2s;
}
.field-textarea:focus{border-color:var(--blue-light);background:var(--white);}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

.radio-group{display:flex;gap:12px;}
.radio-opt{
  flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:14px;background:var(--gray-100);
  border:1.5px solid var(--border);border-radius:8px;
  cursor:pointer;font-size:14px;font-weight:600;transition:all 0.2s;
  user-select:none;
}
.radio-opt input{display:none;}
.radio-opt.selected-ok{border-color:var(--success);color:var(--success);background:rgba(22,163,74,0.06);}
.radio-opt.selected-bad{border-color:var(--danger);color:var(--danger);background:rgba(220,38,38,0.06);}

.divider{height:1px;background:var(--border);margin:24px 0;}

.btn-submit{
  width:100%;background:var(--blue);color:var(--white);border:none;
  padding:16px;font-family:'Barlow Condensed',sans-serif;
  font-weight:800;font-size:16px;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;border-radius:8px;transition:all 0.2s;margin-top:8px;
}
.btn-submit:hover{background:var(--blue-mid);}
.btn-submit:active{transform:scale(0.99);}

.form-meta{
  font-size:11px;color:var(--gray-400);margin-top:14px;
  font-family:'DM Mono',monospace;text-align:center;
}

/* SUCCESS */
.success-screen{display:none;padding:48px 32px;text-align:center;}
.success-icon{font-size:64px;margin-bottom:20px;}
.success-title{
  font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;
  color:var(--blue);margin-bottom:8px;
}
.success-msg{color:var(--gray-600);font-size:15px;line-height:1.6;margin-bottom:32px;}
.btn-novo{
  background:transparent;border:2px solid var(--blue);color:var(--blue);
  padding:12px 32px;font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:14px;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;border-radius:8px;transition:all 0.2s;
}
.btn-novo:hover{background:var(--blue);color:var(--white);}

@media(max-width:480px){
  .card-body{padding:24px;}
  .grid-2{grid-template-columns:1fr;}
  body{padding:0;align-items:flex-start;}
  .card{border-radius:0;min-height:100vh;}
}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="brand">DRILL<span>GEO</span></div>
    <div class="subtitle">Apontamento Semanal de Frota</div>
  </div>

  <!-- FORMULÁRIO -->
  <div class="card-body" id="form-body">

    <div class="grid-2">
      <div class="field-block">
        <label class="field-label">Placa do Veículo *</label>
        <input class="field-input" id="f-plate" type="text" placeholder="ABC-1234" autocomplete="off" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="field-block">
        <label class="field-label">Modelo *</label>
        <select class="field-select" id="f-model">
          <option value="">Selecione...</option>
          <option>VW Saveiro</option>
          <option>Fiat Toro</option>
          <option>Toyota Hilux</option>
          <option>Fiat Strada</option>
          <option>Outro</option>
        </select>
      </div>
    </div>

    <div class="field-block">
      <label class="field-label">Projeto / Obra *</label>
      <input class="field-input" id="f-project" type="text" placeholder="Nome da obra ou projeto">
    </div>

    <div class="field-block">
      <label class="field-label">KM Atual — Odômetro *</label>
      <input class="field-input" id="f-km" type="number" inputmode="numeric" placeholder="Ex: 45230">
    </div>

    <div class="field-block">
      <label class="field-label">Data da Última Manutenção Preventiva *</label>
      <input class="field-input" id="f-lastmaint" type="date">
    </div>

    <div class="divider"></div>

    <div class="field-block">
      <label class="field-label">Estado dos Pneus *</label>
      <div class="radio-group">
        <label class="radio-opt" id="opt-ok" onclick="selectTire('ok')">
          <input type="radio" name="tires" value="ok">✓ Bom
        </label>
        <label class="radio-opt" id="opt-bad" onclick="selectTire('bad')">
          <input type="radio" name="tires" value="bad">✗ Ruim
        </label>
      </div>
    </div>

    <div class="field-block">
      <label class="field-label">Necessidade de Manutenção</label>
      <div class="field-hint">Há necessidade de manutenção mecânica, funilaria ou outro reparo? Descreva com detalhes — barulhos, amassados, luzes no painel, vazamentos, etc.</div>
      <textarea class="field-textarea" id="f-obs" placeholder="Ex: Luz de óleo acesa, barulho ao frear, amassado no para-choque traseiro..."></textarea>
    </div>

    <button class="btn-submit" onclick="submitForm()">ENVIAR APONTAMENTO</button>
    <div class="form-meta" id="form-datetime"></div>
  </div>

  <!-- SUCESSO -->
  <div class="success-screen" id="success-screen">
    <div class="success-icon">✅</div>
    <div class="success-title">Registrado!</div>
    <div class="success-msg">
      Seu apontamento foi enviado com sucesso.<br>
      Obrigado pela colaboração.
    </div>
    <button class="btn-novo" onclick="resetForm()">NOVO REGISTRO</button>
  </div>
</div>

<script>
let tireState = '';

// Atualiza data/hora ao carregar
window.addEventListener('load', () => {
  updateDatetime();
});

function updateDatetime() {
  const el = document.getElementById('form-datetime');
  if (el) el.textContent = 'Data/Hora do registro: ' + new Date().toLocaleString('pt-BR');
}

function selectTire(val) {
  tireState = val;
  document.getElementById('opt-ok').className  = 'radio-opt' + (val === 'ok'  ? ' selected-ok'  : '');
  document.getElementById('opt-bad').className = 'radio-opt' + (val === 'bad' ? ' selected-bad' : '');
}

function submitForm() {
  const plate     = document.getElementById('f-plate').value.trim().toUpperCase();
  const model     = document.getElementById('f-model').value;
  const project   = document.getElementById('f-project').value.trim();
  const km        = parseInt(document.getElementById('f-km').value);
  const lastMaint = document.getElementById('f-lastmaint').value;
  const obs       = document.getElementById('f-obs').value.trim();

  if (!plate || !model || !project || !km || !lastMaint || !tireState) {
    alert('Por favor, preencha todos os campos obrigatórios (*).');
    return;
  }

  // Salva no localStorage (mesma chave do dashboard)
  const records = JSON.parse(localStorage.getItem('drg_records') || '[]');
  records.push({
    id: Date.now(),
    datetime: new Date().toISOString(),
    plate, model, project, km, lastMaint,
    tires: tireState, obs
  });
  localStorage.setItem('drg_records', JSON.stringify(records));

  document.getElementById('form-body').style.display   = 'none';
  document.getElementById('success-screen').style.display = 'block';
}

function resetForm() {
  ['f-plate','f-project','f-km','f-lastmaint','f-obs'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-model').value = '';
  tireState = '';
  document.getElementById('opt-ok').className  = 'radio-opt';
  document.getElementById('opt-bad').className = 'radio-opt';
  document.getElementById('form-body').style.display      = 'block';
  document.getElementById('success-screen').style.display = 'none';
  updateDatetime();
}
</script>
</body>
</html>
